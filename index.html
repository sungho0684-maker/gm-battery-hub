<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>국민BT 자동차 배터리 — 차종별 구매</title>
<meta name="description" content="국민BT 택배 셀프교체 자동차 배터리 차종별 구매. 네이버 스마트스토어 정식 판매. 정품 신선제품, 공구 무료대여, 폐배터리 무상회수.">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#eef2f8;color:#1c2b46;padding-bottom:36px;-webkit-tap-highlight-color:transparent}
.wrap{max-width:560px;margin:0 auto;padding:0 13px}
.hd{background:#fff;color:#1c2b46;padding:20px 16px 18px;border-radius:0 0 22px 22px;text-align:center;box-shadow:0 3px 12px rgba(20,40,90,.09)}
.hd img.logo{height:64px;display:inline-block}
.hd .tag{font-size:.85rem;color:#5a6b8a;margin-top:9px;line-height:1.55}
.hd .tag b{color:#15336e}
.hd .trust{margin-top:11px;display:inline-flex;align-items:center;gap:6px;background:#e7f9ef;border:1px solid #9fe3bd;color:#0a7a3d;border-radius:20px;padding:5px 13px;font-size:.78rem;font-weight:800}
.benefit{display:flex;gap:6px;max-width:560px;margin:12px auto 0;padding:0 13px}
.benefit div{flex:1;background:#fff;border:1px solid #e2e9f4;border-radius:10px;padding:8px 4px;text-align:center;font-size:.7rem;font-weight:700;color:#3a4a68;line-height:1.35}
.benefit div span{display:block;font-size:1.05rem;margin-bottom:1px}
.srch{margin:14px 0 9px;position:sticky;top:8px;z-index:5}
.srch input{width:100%;padding:13px 15px;border:2px solid #cdd9ee;border-radius:12px;font-size:1rem;background:#fff;box-shadow:0 2px 9px rgba(0,0,0,.06)}
.srch input:focus{outline:none;border-color:#2360c4}
.filt{display:flex;gap:6px;margin-bottom:11px}
.filt button{flex:1;padding:9px 4px;border:1.5px solid #cdd9ee;background:#fff;border-radius:10px;font-size:.85rem;font-weight:800;color:#456;cursor:pointer}
.filt button.on{background:#15336e;color:#fff;border-color:#15336e}
.ask{background:#fff7e6;border:1px solid #ffd98a;border-radius:11px;padding:10px 13px;font-size:.82rem;color:#7a5b10;margin-bottom:11px;line-height:1.5}
.ask b{color:#b5740b}
.cnt{font-size:.78rem;color:#7384a3;margin:0 0 7px 3px}
.grphd{font-size:.82rem;font-weight:800;color:#5f78a8;margin:15px 0 7px;padding-left:3px}
.card{background:#fff;border:1px solid #e2e9f4;border-radius:14px;padding:12px 14px;margin-bottom:9px;display:flex;align-items:center;gap:11px;box-shadow:0 1px 5px rgba(0,0,0,.04)}
.card .info{flex:1;min-width:0}
.card .car{font-size:1rem;font-weight:800;color:#1c2b46;line-height:1.25}
.card .meta{font-size:.76rem;color:#8090ad;margin-top:3px}
.card .meta b{color:#2360c4}
.card .price{font-weight:900;color:#15336e}
.npay{display:flex;align-items:center;gap:5px;background:#03C75A;color:#fff;text-decoration:none;font-weight:800;font-size:.9rem;padding:11px 14px;border-radius:10px;white-space:nowrap;box-shadow:0 2px 6px rgba(3,199,90,.35)}
.npay:active{background:#02a94c}
.npay .n{background:#fff;color:#03C75A;width:18px;height:18px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:.82rem}
.empty{text-align:center;color:#99a;padding:28px 0;font-weight:600}
.foot{text-align:center;font-size:.78rem;color:#7384a3;margin-top:18px;line-height:1.75}
.foot b{color:#2360c4}
.foot .biz{font-size:.72rem;color:#9aa7bf;margin-top:8px}
</style></head><body>
